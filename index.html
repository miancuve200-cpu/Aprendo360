<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendo360 - App Educativa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f0f4f8; padding: 2rem; }
        header { text-align: center; margin-bottom: 3rem; }
        h1 { color: #2c3e50; font-size: 2.5rem; }
        p.subtitulo { color: #7f8c8d; font-size: 1.2rem; margin-top: 0.5rem; }

        .grid-asignaturas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 2rem;
            max-width: 950px;
            margin: 0 auto;
        }

        .boton-asignatura {
            background: #ffffff;
            padding: 1.8rem 1rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
            text-decoration: none;
            color: inherit;
        }

        .boton-asignatura:hover { transform: translateY(-6px); }

        .icono {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        h3 { color: #2c3e50; font-size: 1.1rem; }

        footer {
            text-align: center;
            margin-top: 4rem;
            padding: 1.5rem;
            color: #7f8c8d;
        }

        footer a {
            color: #2980b9;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Aprendo360</h1>
        <p class="subtitulo">Tu espacio de aprendizaje</p>
    </header>

    <div class="grid-asignaturas">
        <a href="lengua.html" class="boton-asignatura">
            <span class="icono">📖</span>
            <h3>Lengua y Literatura</h3>
        </a>
        <a href="ingles.html" class="boton-asignatura">
            <span class="icono">🗣️</span>
            <h3>Inglés</h3>
        </a>
        <a href="artistica.html" class="boton-asignatura">
            <span class="icono">🎨</span>
            <h3>Educación Cultural y Artística</h3>
        </a>
        <a href="fisica.html" class="boton-asignatura">
            <span class="icono">⚽</span>
            <h3>Educación Física</h3>
        </a>
        <a href="perfil.html" class="boton-asignatura">
            <span class="icono">👤</span>
            <h3>Perfil</h3>
        </a>
    </div>

    <footer>
        <a href="privacidad.html">Políticas de Privacidad</a>
        &nbsp; | &nbsp;
        <span>© 2026 Aprendo360</span>
    </footer>
</body>
</html>
